<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Background Gradient (Methylene Blue theme) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002244" />
      <stop offset="100%" stop-color="#0052a3" />
    </linearGradient>
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e098" />
      <stop offset="50%" stop-color="#d4a843" />
      <stop offset="100%" stop-color="#a77a1d" />
    </linearGradient>
  </defs>

  <!-- Base rounded background -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)" />

  <!-- Stylized geometric 'A' -->
  <path d="M16 6 L24 26 H19.5 L18 21.5 H14 L12.5 26 H8 Z M15 17.5 H17 L16 14 Z" fill="url(#goldGrad)" />

  <!-- Sleek neon blue node/accent -->
  <circle cx="16" cy="10" r="1.8" fill="#60a5fa" opacity="0.9" />
</svg>
